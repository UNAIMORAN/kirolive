<svg xmlns="http://www.w3.org/2000/svg" width="600" height="198" viewBox="0 0 600 198">
  <!--
    Kirolive · 4 propuestas de "K" con más personalidad.
    Ábrelo en el navegador o en VS Code (clic derecho > Open Preview).
    Cada K es geometría real, lista para portar a lib/widgets/brand.dart.
      A · Velocidad (cursiva)   B · Swoosh (curva)
      C · Stencil (corte)       D · Cima (montaña)
  -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C6F432"/>
      <stop offset="1" stop-color="#14B88A"/>
    </linearGradient>
  </defs>

  <!-- Panel oscuro (como en la app) -->
  <rect x="0" y="0" width="600" height="198" rx="16" fill="#0A0F0D"/>

  <!-- ============ A · VELOCIDAD (K cursiva, inclinada) ============ -->
  <g transform="translate(24,24)">
    <rect width="120" height="120" rx="33.6" fill="url(#brand)"/>
    <g fill="none" stroke="#0A140F" stroke-width="13.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M39.18 27.6 L28.82 92.4"/>
      <path d="M83 28.8 L34 60 L72.62 93.6"/>
    </g>
    <circle cx="83" cy="28.8" r="9" fill="#0A140F"/>
    <text x="60" y="142" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#F0F5F1">A · Velocidad</text>
  </g>

  <!-- ============ B · SWOOSH (brazo superior curvo) ============ -->
  <g transform="translate(168,24)">
    <rect width="120" height="120" rx="33.6" fill="url(#brand)"/>
    <g fill="none" stroke="#0A140F" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
      <path d="M36 26 L36 94"/>
      <path d="M36 58 L82 94"/>
      <path d="M36 58 Q52 34 84 26"/>
    </g>
    <circle cx="84" cy="26" r="9" fill="#0A140F"/>
    <text x="60" y="142" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#F0F5F1">B · Swoosh</text>
  </g>

  <!-- ============ C · STENCIL (corte entre asta y brazos) ============ -->
  <g transform="translate(312,24)">
    <rect width="120" height="120" rx="33.6" fill="url(#brand)"/>
    <g fill="none" stroke="#0A140F" stroke-width="15" stroke-linecap="butt" stroke-linejoin="miter">
      <path d="M36 26 L36 94"/>
      <path d="M50 52 L84 26"/>
      <path d="M50 68 L84 94"/>
    </g>
    <circle cx="84" cy="26" r="8.5" fill="#0A140F"/>
    <text x="60" y="142" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#F0F5F1">C · Stencil</text>
  </g>

  <!-- ============ D · CIMA (pico/montaña en vez de punto) ============ -->
  <g transform="translate(456,24)">
    <rect width="120" height="120" rx="33.6" fill="url(#brand)"/>
    <g fill="none" stroke="#0A140F" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
      <path d="M37 24 L37 92"/>
      <path d="M78 32 L37 56 L80 92"/>
    </g>
    <!-- Pico de cima al final del brazo que asciende -->
    <polygon points="78,18 69,33 87,33" fill="#0A140F"/>
    <text x="60" y="142" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#F0F5F1">D · Cima</text>
  </g>
</svg>
